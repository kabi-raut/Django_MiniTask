<!DOCTYPE html><html><head><title>Login</title></head><body style="font-family:Arial;background:#f5f5f5;">
<div style="max-width:500px;margin:40px auto;background:#fff;padding:24px;border-radius:8px;">
<h2>Login</h2>
<form method="post">{% csrf_token %}
<p><input name="username" placeholder="Username" required></p>
<p><input type="password" name="password" placeholder="Password" required></p>
<button type="submit">Login</button>
</form>
<p><a href="{% url 'chapter8_user_dashboard:register' %}">Create account</a></p>
{% if messages %}<ul>{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>{% endif %}
</div></body></html>
