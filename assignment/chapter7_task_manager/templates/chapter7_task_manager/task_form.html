<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {font-family: Arial, sans-serif; background:#f5f5f5; margin:0;}
        .container {max-width: 700px; margin:40px auto; background:#fff; padding:24px; border-radius:8px;}
        input, select, textarea {width:100%; padding:10px; margin:8px 0 16px; border:1px solid #ddd; border-radius:6px;}
        button, .btn {padding:10px 16px; border:none; border-radius:6px; text-decoration:none; display:inline-block;}
        button {background:#667eea; color:#fff;}
        .btn {background:#6c757d; color:#fff;}
    </style>
</head>
<body>
<div class="container">
    <h1>{{ title }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{{ button_text }}</button>
        <a class="btn" href="{% url 'chapter7_task_manager:task_list' %}">Cancel</a>
    </form>
</div>
</body>
</html>
