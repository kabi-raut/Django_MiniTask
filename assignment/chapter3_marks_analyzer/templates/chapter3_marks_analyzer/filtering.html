<!DOCTYPE html>
<html>
<head>
    <title>Filtering Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }
        select, input, button {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Filtering Data</h1>
        
        <form method="post">
            {% csrf_token %}
            <select name="column" required>
                <option value="">Select column...</option>
                {% for col in columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
            
            <select name="operator" required>
                <option value="">Operator...</option>
                <option value="equals">Equals</option>
                <option value="greater">Greater than</option>
                <option value="less">Less than</option>
                <option value="contains">Contains</option>
            </select>
            
            <input type="text" name="value" placeholder="Value" required>
            <button type="submit">Filter</button>
        </form>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        {% if filtered_data %}
            <div class="table-wrapper">
                {{ filtered_data | safe }}
            </div>
        {% endif %}

        <div class="back-link">
            <a href="{% url 'chapter3_marks_analyzer:index' %}">← Back to Menu</a>
        </div>
    </div>
</body>
</html>
