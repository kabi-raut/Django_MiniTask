<!DOCTYPE html>
<html>
<head>
    <title>View Marks Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👁️ View Marks Data</h1>
        
        {% if error %}
            <div class="alert error">{{ error }}</div>
            <p style="text-align: center;">Please <a href="{% url 'chapter3_marks_analyzer:upload_data' %}">upload data</a> first.</p>
        {% else %}
            {% if data_html %}
                <div class="table-wrapper">
                    {{ data_html | safe }}
                </div>
            {% else %}
                <p style="text-align: center; color: #666;">No data available. Please <a href="{% url 'chapter3_marks_analyzer:upload_data' %}">upload data</a> first.</p>
            {% endif %}
        {% endif %}

        <div class="back-link">
            <a href="{% url 'chapter3_marks_analyzer:index' %}">← Back to Menu</a>
        </div>
    </div>
</body>
</html>
