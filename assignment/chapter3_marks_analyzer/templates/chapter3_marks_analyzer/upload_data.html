<!DOCTYPE html>
<html>
<head>
    <title>Upload Marks Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        textarea {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            min-height: 250px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        button {
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 Upload Marks Data</h1>
        
        <div class="info">
            <strong>Format:</strong> CSV format (comma-separated values)<br>
            <strong>Example:</strong><br>
            Name,Subject,Marks<br>
            Alice,Math,95<br>
            Bob,Math,87
        </div>

        {% if success %}
            <div class="alert success">✓ {{ success }}</div>
        {% endif %}

        {% if error %}
            <div class="alert error">✗ {{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <textarea name="data" placeholder="Paste your CSV data here..." required></textarea>
            <button type="submit">Upload Data</button>
        </form>

        <div class="back-link">
            <a href="{% url 'chapter3_marks_analyzer:index' %}">← Back to Menu</a>
        </div>
    </div>
</body>
</html>
