<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 36px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .post {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .post h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }
        .post-meta {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }
        .post-content {
            color: #666;
            line-height: 1.8;
            font-size: 16px;
            white-space: pre-wrap;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-link:hover {
            color: #764ba2;
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ post.title }}</h1>
    </header>

    <div class="container">
        <article class="post">
            <div class="post-meta">
                <span class="category">{{ post.category }}</span>
                By <strong>{{ post.author }}</strong> on <strong>{{ post.date }}</strong>
            </div>
            <div class="post-content">
                {{ post.content }}
            </div>
            <a href="{% url 'chapter5_blog_homepage:index' %}" class="back-link">← Back to Blog</a>
        </article>
    </div>

    <footer>
        <p>&copy; 2024 Chapter 5 - Blog Homepage Demo</p>
    </footer>
</body>
</html>
