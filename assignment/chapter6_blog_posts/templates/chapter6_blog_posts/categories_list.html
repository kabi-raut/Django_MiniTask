<!DOCTYPE html>
<html>
<head>
    <title>All Categories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .category-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            text-align: center;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        .category-card a {
            color: #667eea;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }
        .category-card a:hover {
            color: #764ba2;
        }
        .category-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="{% url 'chapter6_blog_posts:index' %}" class="back-link">← Back</a>
            <h1>All Categories</h1>
        </div>
    </header>

    <div class="container">
        <div class="categories-grid">
            {% for category in categories %}
                <div class="category-card">
                    <a href="{% url 'chapter6_blog_posts:category_posts' category.slug %}">{{ category.name }}</a>
                    {% if category.description %}
                        <p class="category-desc">{{ category.description }}</p>
                    {% endif %}
                </div>
            {% empty %}
                <div style="grid-column: 1 / -1; text-align: center; color: #999; padding: 40px;">
                    <p>No categories found.</p>
                </div>
            {% endfor %}
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Chapter 6 - Blog Post System Demo</p>
    </footer>
</body>
</html>
