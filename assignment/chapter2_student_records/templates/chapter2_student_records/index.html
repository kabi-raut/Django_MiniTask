<!DOCTYPE html>
<html>
<head>
    <title>Chapter 2 - Student Record Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .menu {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            flex-direction: column;
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s;
        }
        a:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chapter 2: Student Record Manager</h1>
        <p>Choose an operation:</p>
        <div class="menu">
            <a href="{% url 'chapter2_student_records:list_students' %}">View All Students</a>
            <a href="{% url 'chapter2_student_records:add_student' %}">Add New Student</a>
            <a href="{% url 'chapter2_student_records:search_student' %}">Search Student</a>
        </div>
    </div>
</body>
</html>
