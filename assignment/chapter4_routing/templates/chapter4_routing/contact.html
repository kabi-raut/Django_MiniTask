<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            transition: all 0.3s;
        }
        nav a:hover {
            color: #667eea;
        }
        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        main {
            flex: 1;
            padding: 40px 0;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        input, textarea {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }
        button {
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #c3e6cb;
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-brand">Web App</div>
            <div>
                <a href="{% url 'chapter4_routing:home' %}">Home</a>
                <a href="{% url 'chapter4_routing:about' %}">About</a>
                <a href="{% url 'chapter4_routing:services' %}">Services</a>
                <a href="{% url 'chapter4_routing:blog' %}">Blog</a>
                <a href="{% url 'chapter4_routing:portfolio' %}">Portfolio</a>
                <a href="{% url 'chapter4_routing:contact' %}">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="form-container">
                {% if submitted %}
                    <div class="success-message">
                        <h2>Thank you, {{ name }}!</h2>
                        <p>We've received your message and will get back to you soon.</p>
                    </div>
                {% else %}
                    <h1>Contact Us</h1>
                    <form method="post">
                        {% csrf_token %}
                        <input type="text" name="name" placeholder="Your Name" required>
                        <input type="email" name="email" placeholder="Your Email" required>
                        <textarea name="message" placeholder="Your Message" rows="6" required></textarea>
                        <button type="submit">Send Message</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Chapter 4 - Django Routing Demo</p>
    </footer>
</body>
</html>
