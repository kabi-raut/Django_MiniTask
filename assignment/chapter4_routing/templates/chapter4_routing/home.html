<!DOCTYPE html>
<html>
<head>
    <title>Chapter 4 - Basic Web Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            transition: all 0.3s;
        }
        nav a:hover {
            color: #667eea;
        }
        .nav-brand {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        main {
            flex: 1;
            padding: 40px 0;
        }
        .hero {
            background: white;
            padding: 60px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            color: #333;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .hero p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .cta-button {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            margin: 0 10px;
        }
        .cta-button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        footer {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="nav-brand">Web App</div>
            <div>
                <a href="{% url 'chapter4_routing:home' %}">Home</a>
                <a href="{% url 'chapter4_routing:about' %}">About</a>
                <a href="{% url 'chapter4_routing:services' %}">Services</a>
                <a href="{% url 'chapter4_routing:blog' %}">Blog</a>
                <a href="{% url 'chapter4_routing:portfolio' %}">Portfolio</a>
                <a href="{% url 'chapter4_routing:contact' %}">Contact</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="hero">
                <h1>Welcome to Chapter 4</h1>
                <p>Basic Web Pages with Custom URL Routing</p>
                <a href="{% url 'chapter4_routing:about' %}" class="cta-button">Get Started</a>
                <a href="{% url 'chapter4_routing:services' %}" class="cta-button">Our Services</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Chapter 4 - Django Routing Demo</p>
    </footer>
</body>
</html>
